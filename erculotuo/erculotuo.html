<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Er Culo Tuo</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ff5ca8;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 60px;
  gap: 30px;
}

.logo-lega {
  width: 120px;
  opacity: 0;
  animation: entraLogo 1s ease forwards;
}

.logo-lega.sinistra { transform: translateX(-50px); }
.logo-lega.destra  { transform: translateX(50px); }

.titolo {
  font-size: 60px;
  margin: 0;
  text-shadow: 2px 2px 10px black;
  animation: glow 2s infinite alternate;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items: center;
  margin-top: 100px;
}

/* COLONNE */
.side {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 100px;
}

.center {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* LOGHI */
.logo {
  width: 180px;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

.logo:hover { transform: scale(1.15); }

/* EFFETTI GLOW */
img[alt="Culo Cup"]:hover     { box-shadow: 0 0 20px gold; }
img[alt="Vomito Cup"]:hover   { box-shadow: 0 0 20px limegreen; }
img[alt="SuperCup"]:hover     { box-shadow: 0 0 20px cyan; }
img[alt="Mezzapiotta"]:hover  { box-shadow: 0 0 20px red; }
img[alt="Championship"]:hover { box-shadow: 0 0 25px white; }

/* CENTRO */
.championship {
  width: 225px;
  margin-bottom: 20px;
}

/* MENU */
select {
  font-size: 20px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 60px;
}

/* ANIMAZIONI */
@keyframes entraLogo {
  to { opacity: 1; transform: translateX(0); }
}

@keyframes glow {
  from { text-shadow: 0 0 10px black; }
  to   { text-shadow: 0 0 25px white; }
}

.logo-lega:hover {
  transform: scale(1.2);
  box-shadow: 0 0 20px white;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="ErCuloTuo.png" class="logo-lega sinistra" alt="Logo Lega">
  <h1 class="titolo">Er Culo Tuo</h1>
  <img src="ErCuloTuo.png" class="logo-lega destra" alt="Logo Lega">
</div>

<!-- LAYOUT -->
<div class="layout">
  <!-- SINISTRA -->
  <div class="side">
    <a href="culocup.html"><img src="culocup.png" class="logo" alt="Culo Cup"></a>
    <a href="supercup.html"><img src="supercup.png" class="logo" alt="SuperCup"></a>
  </div>

  <!-- CENTRO -->
  <div class="center">
    <a href="championship.html"><img src="championship.png" class="championship" alt="Championship"></a>
    <select onchange="vaiAllaSquadra(this.value)">
      <option value="">Seleziona squadra</option>
      <option value="57boys.html">57 Boys</option>
      <option value="actuan.html">Ac Tuan</option>
      <option value="bayern.html">Bayern Lavinkusen</option>
      <option value="fornaretto.html">Fc Fornaretto</option>
      <option value="longobarda.html">Longobarda</option>
      <option value="scarsenal.html">Scarsenal</option>
      <option value="stokeazzo.html">Stoke Azzo</option>
      <option value="stsohg.html">Stsohg 75</option>
      <option value="stars.html">The Stars</option>
      <option value="winning.html">Winning Eleven</option>
    </select>
  </div>

  <!-- DESTRA -->
  <div class="side">
    <a href="vomitocup.html"><img src="vomitocup.png" class="logo" alt="Vomito Cup"></a>
    <a href="mezzapiotta.html"><img src="mezzapiotta.png" class="logo" alt="Mezzapiotta"></a>
  </div>
</div>

<script>
function vaiAllaSquadra(pagina) {
  if (pagina !== "") {
    window.location.href = pagina;
  }
}
</script>
</body>
</html>
