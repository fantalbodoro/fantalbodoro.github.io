<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Culo Cup</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #ff5ca8;
  color: white;
  text-align: center;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 60px;
  gap: 30px;
}

.logo-cup {
  width: 120px;
  opacity: 0;
  animation: entraLogo 1s ease forwards;
}

.logo-cup.sinistra { transform: translateX(-50px); }
.logo-cup.destra { transform: translateX(50px); }

.titolo {
  font-size: 60px;
  margin: 0;
  text-shadow: 2px 2px 10px black;
  animation: glow 2s infinite alternate;
}

/* CONTENUTO PRINCIPALE */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 50px;
  padding: 20px;
}

/* LOGO PRINCIPALE */
.main-logo {
  width: 250px;
  margin: 30px 0;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
}

/* TABELLA */
.tabella-container {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  margin-bottom: 40px;
}

table {
  border-collapse: collapse;
  background-color: rgba(0, 0, 0, 0.3);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
}

th, td {
  padding: 15px 20px;
  border: 2px solid white;
  text-align: center;
  font-size: 16px;
}

th {
  background-color: rgba(0, 0, 0, 0.6);
  font-weight: bold;
  font-size: 18px;
}

tr:hover {
  background-color: rgba(255, 255, 255, 0.1);
}

/* ANIMAZIONI */
@keyframes entraLogo {
  to { opacity: 1; transform: translateX(0); }
}

@keyframes glow {
  from { text-shadow: 0 0 10px black; }
  to   { text-shadow: 0 0 25px white; }
}

.logo-cup:hover {
  transform: scale(1.2);
  box-shadow: 0 0 20px white;
}

/* BACK BUTTON */
.back-button {
  padding: 10px 20px;
  background-color: rgba(0, 0, 0, 0.5);
  color: white;
  border: 2px solid white;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s;
}

.back-button:hover {
  background-color: rgba(255, 255, 255, 0.2);
  transform: scale(1.05);
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <img src="culocup.png" class="logo-cup sinistra" alt="Culo Cup Logo">
  <h1 class="titolo">CULO CUP</h1>
  <img src="culocup.png" class="logo-cup destra" alt="Culo Cup Logo">
</div>

<!-- CONTENUTO -->
<div class="container">
  <img src="culocuplogo.png" class="main-logo" alt="Culo Cup Logo">
  
  <!-- TABELLA - DA AGGIORNARE CON I DATI -->
  <div class="tabella-container">
    <table>
      <thead>
        <tr>
          <th>Anno</th>
          <th>Campione</th>
          <th>Finalista</th>
          <th>Risultato</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>2024</td>
          <td>-</td>
          <td>-</td>
          <td>-</td>
        </tr>
      </tbody>
    </table>
  </div>

  <button class="back-button" onclick="history.back()">← Torna Indietro</button>
</div>

</body>
</html>
