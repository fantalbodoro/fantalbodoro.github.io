<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>FANTALBODORO</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: black; /* Cambia lo sfondo se vuoi */
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: Arial, sans-serif;
        color: white;
    }

    h1 {
        font-size: 4rem;
        margin-top: 30px;
        letter-spacing: 5px;
        font-weight: 900;
        text-shadow: 0 0 20px gold, 0 0 40px orange;
    }

    .rombo {
        margin-top: 80px;
        position: relative;
        width: 400px;
        height: 400px;
    }

    .rombo a img {
        width: 120px;   /* Regola dimensioni logo */
        height: auto;
        position: absolute;
    }

    /* Vertice alto */
    .superleague {
        top: 0;
        left: 50%;
        transform: translateX(-50%);
    }

    /* Vertice sinistro */
    .erculotuo {
        top: 50%;
        left: 0;
        transform: translateY(-50%);
    }

    /* Vertice destro */
    .fantademo {
        top: 50%;
        right: 0;
        transform: translateY(-50%);
    }

    /* Vertice basso */
    .fantapazzi {
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
    }
</style>
</head>

<body>

    <h1>FANTALBODORO</h1>

    <div class="rombo">
        <a href="superleague/superleague.html" class="superleague">
            <img src="superleague.png" alt="Superleague">
        </a>

        <a href="erculotuo/erculotuo.html" class="erculotuo">
            <img src="erculotuo.png" alt="Erculotuo">
        </a>

        <a href="fantademo/fantademo.html" class="fantademo">
            <img src="fantademo.png" alt="FantaDemo">
        </a>

        <a href="fantapazzi/fantapazzi.html" class="fantapazzi">
            <img src="fantapazzi.png" alt="FantaPazzi">
        </a>
    </div>

</body>
</html>
