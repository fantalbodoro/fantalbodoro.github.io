<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FANTALBODORO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top, #2b2b2b 0%, #000 70%);
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* ===== TITOLO EPICO ===== */

h1{
    margin-top:40px;
    font-size:clamp(3rem, 8vw, 6rem);
    letter-spacing:10px;
    font-weight:900;
    color:gold;
    text-transform:uppercase;

    text-shadow:
    0 0 10px gold,
    0 0 20px orange,
    0 0 40px gold,
    0 0 80px orange;

    animation:pulse 1.6s infinite;
}

/* Effetto battito */

@keyframes pulse{

    0%{
        transform:scale(1);
        text-shadow:
        0 0 10px gold,
        0 0 20px orange,
        0 0 40px gold;
    }

    25%{
        transform:scale(1.04);
    }

    40%{
        transform:scale(1.1);
        text-shadow:
        0 0 20px gold,
        0 0 40px orange,
        0 0 80px gold;
    }

    60%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }
}

/* ===== AREA LOGHI ===== */

.container{
    margin-top:40px;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:50px;
}

/* SUPERLEAGUE AL CENTRO */

.superleague img{
    width:min(240px, 55vw);
}

/* RIGA CENTRALE */

.middle-row{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:min(15vw, 140px);
}

/* LOGHI LATERALI */

.middle-row img{
    width:min(180px, 35vw);
}

/* LOGO BASSO */

.fantapazzi img{
    width:min(200px, 45vw);
}

/* ===== EFFETTI HOVER ===== */

a{
    transition:
    transform 0.3s ease,
    filter 0.3s ease;
}

a:hover{
    transform:scale(1.12);
    filter:drop-shadow(0 0 20px gold);
}

/* ===== MOBILE ===== */

@media(max-width:700px){

    .middle-row{
        gap:25px;
    }

    .middle-row img{
        width:38vw;
    }

    .fantapazzi img{
        width:42vw;
    }
}

</style>
</head>

<body>

    <h1>FANTALBODORO</h1>

    <div class="container">

        <!-- LOGO ALTO -->
        <a href="superleague/superleague.html" class="superleague">
            <img src="superleague.png" alt="Superleague">
        </a>

        <!-- LOGHI CENTRALI -->
        <div class="middle-row">

            <a href="erculotuo/erculotuo.html">
                <img src="erculotuo.png" alt="Erculotuo">
            </a>

            <a href="fantademo/fantademo.html">
                <img src="fantademo.png" alt="FantaDemo">
            </a>

        </div>

        <!-- LOGO BASSO -->
        <a href="fantapazzi/fantapazzi.html" class="fantapazzi">
            <img src="fantapazzi.png" alt="FantaPazzi">
        </a>

    </div>

</body>
</html>
